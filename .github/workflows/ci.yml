name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    permissions:
        contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify formatting
        run: npm run format:check

      # - name: Run tests, lint, and compile
      #   run: npm test

      - name: Audit production dependencies
        run: npm run audit

      - name: Validate dependency licenses
        run: npm run check-license
